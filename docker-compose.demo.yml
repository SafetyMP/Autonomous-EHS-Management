# Local Postgres with pgvector for demos and development.
# Usage: docker compose -f docker-compose.demo.yml up -d
# Then copy .env.demo.example to .env.local, set DATABASE_USE_PG=1, run migrations and demo seed.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ehs
      POSTGRES_PASSWORD: ehs
      POSTGRES_DB: ehs
    # Use 5433 on the host so a local Postgres on 5432 does not steal connections.
    ports:
      - "5433:5432"
    volumes:
      - ehs_demo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ehs -d ehs"]
      interval: 5s
      timeout: 5s
      retries: 8

volumes:
  ehs_demo_pg_data:
