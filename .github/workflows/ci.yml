name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded PR runs; keep trunk push jobs (incl. release/publish) to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  IMAGE_NAME: ehs-web

jobs:
  supply-chain-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: npm audit (production transitive, high severity gate)
        run: npm audit --omit=dev --audit-level=high

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - name: Load CI environment (.env.ci)
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            case "$line" in
              ''|\#*) continue ;;
            esac
            echo "$line" >> "$GITHUB_ENV"
          done < .env.ci
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test

  e2e-smoke:
    runs-on: ubuntu-latest
    env:
      CI_E2E_USER_EMAIL: e2e.admin@ci.local
      CI_E2E_USER_PASSWORD: ci-e2e-signin-password-long-enough-ok
      PLAYWRIGHT_E2E_EMAIL: e2e.admin@ci.local
      PLAYWRIGHT_E2E_PASSWORD: ci-e2e-signin-password-long-enough-ok
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ehs_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d ehs_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - name: Load CI environment (.env.ci)
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            case "$line" in
              ''|\#*) continue ;;
            esac
            echo "$line" >> "$GITHUB_ENV"
          done < .env.ci
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run db:seed:ci
      - run: npx playwright install --with-deps chromium
      - name: Integration E2E
        run: ./scripts/integration-e2e.sh

      - name: Threat model PR gate
        if: github.event_name == 'pull_request'
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.sha }}
        run: bash ./scripts/check-threat-model.sh --pr-strict

      - name: Adversarial tier
        run: |
          npm run build
          node .next/standalone/server.js &
          for _ in $(seq 1 60); do
            curl -fsS http://localhost:3000 >/dev/null 2>&1 && break
            sleep 2
          done
          SCOPE=full
          [[ "${{ github.event_name }}" == "pull_request" ]] && SCOPE=pr
          bash ./scripts/adversarial.sh --scope "$SCOPE"
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha || github.sha }}
          GITHUB_HEAD_SHA: ${{ github.sha }}
          # CI fixture for threat-model auth (min 16 chars); not a production secret.
          INTEGRATION_INBOUND_SECRET: ci-integration-inbound-secret-ok

  # Trunk-only: semantic-release after green CI (Scorecard-safe; no workflow_run checkout).
  release:
    name: release
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [supply-chain-audit, verify, e2e-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  # Trunk-only: GHCR publish after green CI (path-filtered).
  publish:
    name: publish
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [supply-chain-audit, verify, e2e-smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2

      - name: Detect publish-relevant changes
        id: changes
        run: |
          set -euo pipefail
          if ! git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only HEAD~1 HEAD | grep -E \
            '^(Dockerfile|\.dockerignore|package\.json|package-lock\.json|next\.config\.ts|tsconfig\.json|eslint\.config\.mjs|postcss\.config\.mjs|drizzle\.config\.ts|src/|public/|\.github/workflows/ci\.yml)' \
            >/dev/null; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "No image-relevant paths changed; skipping GHCR publish."
          fi

      - name: Image coordinates
        if: steps.changes.outputs.publish == 'true'
        id: image
        run: |
          OWNER_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "registry=ghcr.io/${OWNER_REPO}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        if: steps.changes.outputs.publish == 'true'
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        if: steps.changes.outputs.publish == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.changes.outputs.publish == 'true'
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ steps.image.outputs.registry }}:latest
            ${{ steps.image.outputs.registry }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest provenance (SLSA-aligned)
        if: steps.changes.outputs.publish == 'true' && steps.push.outcome == 'success'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ steps.image.outputs.registry }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
