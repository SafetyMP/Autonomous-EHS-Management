name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  supply-chain-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: npm audit (production transitive, high severity gate)
        run: npm audit --omit=dev --audit-level=high

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - name: Load CI environment (.env.ci)
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            case "$line" in
              ''|\#*) continue ;;
            esac
            echo "$line" >> "$GITHUB_ENV"
          done < .env.ci
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test

  e2e-smoke:
    runs-on: ubuntu-latest
    env:
      CI_E2E_USER_EMAIL: e2e.admin@ci.local
      CI_E2E_USER_PASSWORD: ci-e2e-signin-password-long-enough-ok
      PLAYWRIGHT_E2E_EMAIL: e2e.admin@ci.local
      PLAYWRIGHT_E2E_PASSWORD: ci-e2e-signin-password-long-enough-ok
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ehs_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d ehs_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - name: Load CI environment (.env.ci)
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            case "$line" in
              ''|\#*) continue ;;
            esac
            echo "$line" >> "$GITHUB_ENV"
          done < .env.ci
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run db:seed:ci
      - run: npx playwright install --with-deps chromium
      - name: Integration E2E
        run: ./scripts/integration-e2e.sh

      - name: Adversarial tier
        run: |
          npm run build
          node .next/standalone/server.js &
          for _ in $(seq 1 60); do
            curl -fsS http://localhost:3000 >/dev/null 2>&1 && break
            sleep 2
          done
          bash ./scripts/adversarial.sh
