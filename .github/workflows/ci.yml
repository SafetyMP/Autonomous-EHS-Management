name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  supply-chain-audit:
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: npm audit (production transitive, high severity gate)
        run: npm audit --omit=dev --audit-level=high

  verify:
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test

  e2e-smoke:
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:smoke
