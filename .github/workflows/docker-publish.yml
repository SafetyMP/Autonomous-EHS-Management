# Pushes the production Dockerfile to GHCR after CI succeeds on trunk.
# Promote: [.github/workflows/cd-promote-production.yml](cd-promote-production.yml).
#
# Image coordinates: ghcr.io/<lowercase owner>/<lowercase repo name>/ehs-web:<sha>
# `:latest` is published for convenience but must not be used for production promote.
#
name: Container image

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  id-token: write
  actions: read

env:
  IMAGE_NAME: ehs-web

concurrency:
  group: docker-publish-${{ github.repository }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  publish:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' ||
       github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # GHCR requires lowercase org/repo in image URL paths.
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Detect publish-relevant changes
        id: changes
        run: |
          set -euo pipefail
          if ! git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only HEAD~1 HEAD | grep -E \
            '^(Dockerfile|\.dockerignore|package\.json|package-lock\.json|next\.config\.ts|tsconfig\.json|eslint\.config\.mjs|postcss\.config\.mjs|drizzle\.config\.ts|src/|public/|\.github/workflows/docker-publish\.yml)' \
            >/dev/null; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "No image-relevant paths changed; skipping GHCR publish."
          fi

      - name: Image coordinates
        if: steps.changes.outputs.publish == 'true'
        id: image
        run: |
          OWNER_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "registry=ghcr.io/${OWNER_REPO}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          echo "owner_repo=${OWNER_REPO}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        if: steps.changes.outputs.publish == 'true'
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        if: steps.changes.outputs.publish == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.changes.outputs.publish == 'true'
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ steps.image.outputs.registry }}:latest
            ${{ steps.image.outputs.registry }}:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest provenance (SLSA-aligned)
        if: steps.changes.outputs.publish == 'true' && steps.push.outcome == 'success'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ steps.image.outputs.registry }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
