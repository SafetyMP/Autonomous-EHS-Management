# Dual-gated promotion: Vercel (CLI, prebuilt) + AWS EKS rollout to GHCR image.
# Configure GitHub Environment **production** with required reviewers (see REPO_SETUP.md).
#
# Zero-trust posture:
# - EKS: IAM role via GitHub OIDC (AWS_DEPLOY_ROLE_ARN) — no kubeconfig secret.
# - Vercel: GitHub → Vercel CLI still uses a **rotated Vercel Access Token** stored as an
#   environment-scoped secret (`VERCEL_TOKEN`). Vercel's documented OIDC federation is
#   designed for Vercel workloads calling *outbound* cloud APIs, not yet a full replacement
#   for Actions → Vercel deploy auth.
#
name: Promote production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag (e.g. git SHA from Container image workflow, or latest)"
        required: true
        default: latest
        type: string
      deploy_vercel:
        description: Run Vercel production deploy (vercel pull/build/deploy --prebuilt)
        type: boolean
        default: true
      rollout_eks:
        description: kubectl set image deployment/ehs-web on EKS
        type: boolean
        default: true

concurrency:
  group: promote-production-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  promote:
    name: Deploy production (Vercel + EKS)
    runs-on: ubuntu-latest
    environment: production
    env:
      SKIP_ENV_VALIDATION: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate inputs
        env:
          WANT_VERCEL: ${{ github.event.inputs.deploy_vercel }}
          WANT_EKS: ${{ github.event.inputs.rollout_eks }}
        run: |
          set -euo pipefail
          if [ "${WANT_VERCEL}" != "true" ] && [ "${WANT_EKS}" != "true" ]; then
            echo "::error::Enable at least one of deploy_vercel or rollout_eks."
            exit 1
          fi

      - name: Setup Node (Vercel prebuilt)
        if: ${{ github.event.inputs.deploy_vercel == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: ${{ github.event.inputs.deploy_vercel == 'true' }}
        run: npx npm@10.9.2 ci

      - name: Install Vercel CLI
        if: ${{ github.event.inputs.deploy_vercel == 'true' }}
        run: npx npm@10.9.2 install --global vercel@55.0.0

      - name: Pull Vercel env (production)
        if: ${{ github.event.inputs.deploy_vercel == 'true' }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Vercel build (prebuilt output)
        if: ${{ github.event.inputs.deploy_vercel == 'true' }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Vercel deploy (prebuilt bundle)
        if: ${{ github.event.inputs.deploy_vercel == 'true' }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Configure AWS credentials (OIDC)
        if: ${{ github.event.inputs.rollout_eks == 'true' }}
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install kubectl
        if: ${{ github.event.inputs.rollout_eks == 'true' }}
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5

      - name: kubeconfig (EKS)
        if: ${{ github.event.inputs.rollout_eks == 'true' }}
        env:
          CLUSTER: ${{ vars.EKS_CLUSTER_NAME }}
          REGION: ${{ vars.AWS_REGION }}
        run: aws eks update-kubeconfig --name "$CLUSTER" --region "$REGION"

      - name: Rollout EKS Deployment
        if: ${{ github.event.inputs.rollout_eks == 'true' }}
        env:
          NS: ${{ vars.K8S_NAMESPACE }}
        run: |
          set -euo pipefail
          OWNER_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_REPO}/ehs-web:${{ github.event.inputs.image_tag }}"
          echo "Deploying ${IMAGE}"
          kubectl -n "${NS}" set image deployment/ehs-web ehs-web="${IMAGE}"
          kubectl -n "${NS}" rollout status deployment/ehs-web --timeout=300s
