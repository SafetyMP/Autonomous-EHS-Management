# Cluster-internal load balancer for pods matching app.kubernetes.io/name=ehs-web.
# map: Docker Compose service name "web" → Kubernetes Service (ClusterIP).
# CronJobs and other in-namespace callers use DNS: http://ehs-web:3000
apiVersion: v1
kind: Service
metadata:
  name: ehs-web
  labels:
    app.kubernetes.io/name: ehs-web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ehs-web
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
