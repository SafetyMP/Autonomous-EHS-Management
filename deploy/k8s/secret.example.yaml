# Example Secret — DO NOT commit real values. Copy to secret.local.yaml (gitignored) or apply via:
#   kubectl -n ehs-prod create secret generic ehs-app-secrets \
#     --from-literal=DATABASE_URL='postgresql://...' \
#     ...
#
# Keys must satisfy src/lib/env.ts (Zod). BETTER_AUTH_SECRET min length 32.
apiVersion: v1
kind: Secret
metadata:
  name: ehs-app-secrets
  labels:
    app.kubernetes.io/name: ehs-web
type: Opaque
stringData:
  DATABASE_URL: "postgresql://USER:PASS@HOST:5432/DBNAME"
  BETTER_AUTH_SECRET: "CHANGE_ME_MIN_32_CHAR_SECRET_STRING!!"
  BETTER_AUTH_URL: "https://app.example.com"
  NEXT_PUBLIC_APP_URL: "https://app.example.com"
  # Required for CronJobs that call /api/cron/* (see cronjob-*.yaml)
  CRON_SECRET: "CHANGE_ME_SHARED_CRON_SECRET"
  # Optional (rate limiting / AI); omit keys if unused
  # UPSTASH_REDIS_REST_URL: "https://..."
  # UPSTASH_REDIS_REST_TOKEN: "..."
  # OPENAI_API_KEY: "..."
  # OPENAI_BASE_URL: "https://api.openai.com/v1"
