schema: threat-model/v1.1
product: Autonomous EHS Management System
updated: "2026-07-19"

runtime:
  base_url_env: ADVERSARIAL_BASE_URL
  default_base_url: http://127.0.0.1:3000

auth:
  # Hardcoded synthetic CI bearer (matches committed .env.ci) so deny cases run under
  # corp-harness evidence runners that strip INTEGRATION_INBOUND_SECRET from the environment.
  global_inbound_bearer:
    bearer: ci-integration-inbound-secret-ok
  short_bearer:
    bearer: short
  wrong_bearer:
    bearer: wrong-tier3-bearer-not-valid-secret

cells:
  - id: integration_inbound
    method: POST
    path: /api/integration/inbound
    pr_scope:
      - src/app/api/integration/**
      - src/lib/integration/**
    baseline: true
    principals: [integration_service]
    auth_mechanism: integration_bearer
    trust_boundary: integration_authenticated
    establishment_failure: "401 Unauthorized"

  - id: cron_reminders
    method: GET
    path: /api/cron/reminders
    pr_scope:
      - src/app/api/cron/**
    baseline: true
    principals: [cron_scheduler]
    auth_mechanism: cron_bearer
    trust_boundary: cron_authenticated
    establishment_failure: "401 Unauthorized"

  - id: context_sync_artifacts
    method: GET
    path: /api/contextsync/artifacts/list
    pr_scope:
      - src/app/api/contextsync/**
      - src/server/services/contextSync/**
    baseline: true
    principals: [authenticated_human]
    auth_mechanism: session_actor
    trust_boundary: context_sync_session_bound
    establishment_failure: "401 Unauthorized"

  - id: scim_users
    method: GET
    path: /api/scim/v2/Users
    pr_scope:
      - src/app/api/scim/**
      - src/server/services/scim/**
    baseline: true
    principals: [scim_provisioner]
    auth_mechanism: scim_bearer
    trust_boundary: scim_authenticated
    establishment_failure: "401 Unauthorized"

deny_cases:
  - id: anonymous_integration_inbound
    cell: integration_inbound
    principal: anonymous
    baseline: true
    fixture:
      method: POST
      body: '{"kind":"hris_membership_sync","organizationId":"00000000-0000-4000-8000-000000000001","workerEmail":"adversarial@example.com"}'
    expect:
      status: 401
      reason_substring: Unauthorized

  - id: short_bearer_inbound
    cell: integration_inbound
    principal: anonymous
    fixture:
      method: POST
      auth: short_bearer
      body: '{"kind":"hris_membership_sync","organizationId":"00000000-0000-4000-8000-000000000001","workerEmail":"adversarial@example.com"}'
    expect:
      status: 401
      reason_substring: Unauthorized

  - id: wrong_bearer_inbound
    cell: integration_inbound
    principal: anonymous
    fixture:
      method: POST
      auth: wrong_bearer
      body: '{"kind":"hris_membership_sync","organizationId":"00000000-0000-4000-8000-000000000001","workerEmail":"adversarial@example.com"}'
    expect:
      status: 401
      reason_substring: Unauthorized

  - id: invalid_payload_inbound
    cell: integration_inbound
    principal: global_inbound_bearer
    fixture:
      method: POST
      auth: global_inbound_bearer
      body: '{}'
    expect:
      status: 400
      reason_substring: Validation failed

  - id: poison_kind_inbound
    cell: integration_inbound
    principal: global_inbound_bearer
    baseline: true
    fixture:
      method: POST
      auth: global_inbound_bearer
      body: '{"kind":"__proto__","organizationId":"00000000-0000-4000-8000-000000000001","workerEmail":"poison@example.com"}'
    expect:
      status: 400
      reason_substring: Validation failed

  - id: anonymous_cron_without_secret
    cell: cron_reminders
    principal: anonymous
    baseline: true
    fixture:
      method: GET
    expect:
      status: 401
      reason_substring: Unauthorized

  - id: anonymous_context_sync_artifacts
    cell: context_sync_artifacts
    principal: anonymous
    baseline: true
    fixture:
      method: GET
      query: org=00000000-0000-4000-8000-000000000001
    expect:
      status: 401
      reason_substring: sign_in_required

  - id: anonymous_spoofed_agent_class_context_sync
    cell: context_sync_artifacts
    principal: anonymous
    baseline: true
    fixture:
      method: GET
      query: org=00000000-0000-4000-8000-000000000001
      headers:
        X-Agent-Class: spoofed-admin-agent
        X-Actor-Id: human:00000000-0000-4000-8000-000000000099
    expect:
      status: 401
      reason_substring: sign_in_required

  - id: anonymous_scim_users
    cell: scim_users
    principal: anonymous
    baseline: true
    fixture:
      method: GET
    expect:
      status: 401
      reason_substring: Missing or invalid Bearer token
